name: Deploy Docs

# This workflow builds the MkDocs site and publishes it to GitHub Pages.
# It only runs for documentation changes, so model training and data work do not trigger a Pages deployment.
on:
  push:
    branches:
      - main
    paths:
      - "docs-site/**"
      - "data_tools/**"
      - "README.md"
      - "README.zh.md"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs-site/requirements.txt

      - name: Install documentation dependencies
        run: pip install -r docs-site/requirements.txt

      - name: Build documentation site
        # Strict mode makes broken links, missing pages, and invalid navigation fail the build.
        run: mkdocs build -f docs-site/mkdocs.yml --strict

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
